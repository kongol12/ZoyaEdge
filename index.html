<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZoyaEdge</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/ycY3rr8j/og-zoyafx-jpg.png" />
    <style>
      body { margin: 0; }
      #root:empty + .preloader-overlay {
        display: flex;
      }
      .preloader-overlay {
        position: fixed;
        inset: 0;
        background-color: #f9fafb;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      @media (prefers-color-scheme: dark) {
        .preloader-overlay { background-color: #09090b; }
      }
      .preloader-spinner {
        position: relative;
        width: 64px;
        height: 64px;
      }
      .spinner-track {
        width: 100%;
        height: 100%;
        border: 4px solid #e5e7eb;
        border-radius: 50%;
      }
      @media (prefers-color-scheme: dark) {
        .spinner-track { border-color: #27272a; }
      }
      .spinner-active {
        position: absolute;
        inset: 0;
        border: 4px solid #FF444F;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 1s linear infinite;
      }
      .spinner-center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 24px;
        height: 24px;
        background-color: #FF444F;
        border-radius: 50%;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse {
        0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; }
        50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
      }
      .preloader-text {
        margin-top: 32px;
        font-family: sans-serif;
        font-weight: 800;
        font-size: 20px;
        color: #111827;
        letter-spacing: -0.025em;
      }
      @media (prefers-color-scheme: dark) {
        .preloader-text { color: #ffffff; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="preloader-overlay">
      <div class="preloader-spinner">
        <div class="spinner-track"></div>
        <div class="spinner-active"></div>
        <div class="spinner-center"></div>
      </div>
      <div class="preloader-text">ZoyaEdge</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
