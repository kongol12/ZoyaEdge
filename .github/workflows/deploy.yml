name: Deploy

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        if: ${{ !secrets.FIREBASE_TOKEN || !secrets.GCP_SA_KEY }}
        run: |
          echo "::warning::Required secrets (FIREBASE_TOKEN, GCP_SA_KEY) are not configured. Deployment skipped."
          exit 0

      - uses: actions/checkout@v4
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}

      - uses: actions/setup-node@v4
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}

      - run: npm run build
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}

      - name: Upload frontend build artifacts
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 3

      - name: Deploy to Firebase Hosting
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZOYAEDGE }}
          channelId: live
          entryPoint: dist

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        if: ${{ !secrets.FIREBASE_TOKEN || !secrets.GCP_SA_KEY }}
        run: |
          echo "::warning::Required secrets (FIREBASE_TOKEN, GCP_SA_KEY) are not configured. Deployment skipped."
          exit 0

      - uses: actions/checkout@v4
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}

      - name: Authenticate to Google Cloud
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: zoyaedge
          source: ./dist/server.cjs
          region: europe-west1
