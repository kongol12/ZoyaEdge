# ZoyaEdge Deployment Workflow (Example)
# This is a template for deploying the monorepo to Cloud Run (Server) and Firebase Hosting (Web).

name: Deploy

on:
  push:
    branches: [ main ] # Only deploy on push to main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. Deploy Frontend to Firebase Hosting
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        if: ${{ !secrets.FIREBASE_TOKEN || !secrets.GCP_SA_KEY }}
        run: |
          echo "::warning::Required secrets (FIREBASE_TOKEN, GCP_SA_KEY) are not configured. Deployment skipped."
          exit 0

      - uses: actions/checkout@v4
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
      - uses: actions/setup-node@v4
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        run: npm ci
      - name: Build
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        run: npm run build
      - name: Upload frontend build artifacts
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 1
      - name: Deploy to Firebase
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZOYAEDGE }}'
          channelId: live
          projectId: zoyaedge-prod # Replace with your project ID
          entryPoint: dist

  # 2. Deploy Backend to Cloud Run
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        if: ${{ !secrets.FIREBASE_TOKEN || !secrets.GCP_SA_KEY }}
        run: |
          echo "::warning::Required secrets (FIREBASE_TOKEN, GCP_SA_KEY) are not configured. Deployment skipped."
          exit 0

      - uses: actions/checkout@v4
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
      - name: Auth with Google Cloud
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        # uses: google-github-actions/auth@v2
        # with:
        #   credentials_json: '${{ secrets.GCP_SA_KEY }}'
        run: echo "Authenticate with GCP"

      - name: Set up Cloud SDK
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        # uses: google-github-actions/setup-gcloud@v2
        run: echo "Setup gcloud"

      - name: Build and Push Docker Image
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        run: |
          # docker build -t gcr.io/zoyaedge-prod/server:latest .
          # docker push gcr.io/zoyaedge-prod/server:latest
          echo "Docker build and push"

      - name: Deploy to Cloud Run
        if: ${{ secrets.FIREBASE_TOKEN && secrets.GCP_SA_KEY }}
        run: |
          # gcloud run deploy zoyaedge-server \
          #   --image gcr.io/zoyaedge-prod/server:latest \
          #   --platform managed \
          #   --region us-east1 \
          #   --allow-unauthenticated
          echo "GCloud Run Deploy"

# Instructions for setting secrets:
# 1. FIREBASE_SERVICE_ACCOUNT_ZOYAEDGE: Get from Firebase Console > Project Settings > Service Accounts.
# 2. GCP_SA_KEY: Service Account Key with Cloud Run and Artifact Registry permissions.
# 3. GEMINI_API_KEY: Your Gemini API Key from Google AI Studio.
