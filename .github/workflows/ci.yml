name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Run npm security audit
      id: audit
      run: |
        npm audit --audit-level=high --json > audit.json || true
        node -e "
        const fs = require('fs');
        const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
        const count = Object.keys(audit.advisories || {}).length;
        if (count > 0) {
          console.log('::warning::' + count + ' vulnerabilities found (see artifact npm-audit-report)');
        }
        "
    - uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: npm-audit-report
        path: audit.json
        retention-days: 3

    - name: Run Tests
      run: npm run test
